<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Noalan Manifesto</title>
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: black;
      color: white;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .title {
      font-size: 4rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      text-shadow: 0 0 20px #fff;
    }

    .point {
      min-height: 100vh;
      padding: 5rem;
      background: rgba(0,0,0,0.8);
      border-bottom: 2px solid #333;
    }

    .final {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #fff, #000);
    }
  </style>
  <!-- GSAP for animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <!-- Three.js for particles -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
  <!-- Hero Section -->
  <section class="hero">
    <canvas id="bgCanvas"></canvas>
    <h1 class="title">The Noalan Manifesto</h1>
  </section>

  <!-- Manifesto Points -->
  <section class="point" id="p1">
    <h2>Principle One</h2>
    <p>Text of your first principle...</p>
  </section>

  <section class="point" id="p2">
    <h2>Principle Two</h2>
    <p>Text of your second principle...</p>
  </section>

  <!-- Final Section -->
  <section class="final">
    <h2>Final Declaration</h2>
    <p>Closing words...</p>
  </section>

  <!-- Ambient Audio -->
  <audio id="ambient" autoplay loop>
    <source src="ambient.mp3" type="audio/mpeg">
  </audio>

  <!-- Sound Effects -->
  <audio id="chime" src="chime.mp3" preload="auto"></audio>
  <audio id="echo" src="echo.mp3" preload="auto"></audio>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    // Helper: play sound by ID
    function playSound(id) {
      const sound = document.getElementById(id);
      if (sound) {
        sound.currentTime = 0;
        sound.play();
      }
    }

    // Title animation
    gsap.from(".title", {
      duration: 2,
      opacity: 0,
      y: -100,
      ease: "power4.out",
      onComplete: () => playSound("chime")
    });

    // Scroll-triggered animations with sound
    gsap.utils.toArray(".point").forEach((section) => {
      gsap.from(section, {
        scrollTrigger: {
          trigger: section,
          start: "top 80%",
          onEnter: () => playSound("echo")
        },
        opacity: 0,
        y: 100,
        duration: 1.5,
        ease: "power3.out"
      });
    });

    gsap.from(".final", {
      scrollTrigger: {
        trigger: ".final",
        start: "top 80%",
        onEnter: () => playSound("chime")
      },
      scale: 0.8,
      opacity: 0,
      duration: 2,
      ease: "elastic.out(1, 0.3)"
    });

    // Three.js Particle Background
    const canvas = document.getElementById("bgCanvas");
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    const particles = new THREE.Geometry();
    for (let i = 0; i < 500; i++) {
      const vertex = new THREE.Vector3(
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 10
      );
      particles.vertices.push(vertex);
    }

    const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 });
    const particleSystem = new THREE.Points(particles, material);
    scene.add(particleSystem);

    function animate() {
      requestAnimationFrame(animate);
      particleSystem.rotation.y += 0.001;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
</body>
</html>
